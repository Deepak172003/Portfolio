<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050505" />
  <title>Deepak Kumar Singh | Document Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #050505;
      --surface: rgba(17, 17, 17, 0.96);
      --line: rgba(255, 255, 255, 0.08);
      --text: #f5f5f1;
      --muted: #cfcfca;
      --red: #e50914;
      --red-soft: #ff4438;
      --gold: #f5c96c;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Manrope", sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(229, 9, 20, 0.2), transparent 24%),
        linear-gradient(180deg, #0a0a0a 0%, var(--bg) 100%);
    }

    .page {
      width: min(1280px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background:
        radial-gradient(circle at top right, rgba(229, 9, 20, 0.2), transparent 28%),
        linear-gradient(180deg, rgba(18, 18, 18, 0.96), rgba(7, 7, 7, 0.98));
      box-shadow: var(--shadow);
    }

    .title-wrap {
      min-width: 0;
    }

    .eyebrow {
      display: inline-block;
      color: var(--gold);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 8px 0 0;
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2.1rem, 5vw, 3.8rem);
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .topbar p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: flex-end;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      color: var(--text);
      font-weight: 800;
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--red), var(--red-soft));
    }

    .btn-secondary {
      color: white;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .viewer {
      height: calc(100vh - 154px);
      min-height: 540px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(22, 22, 22, 0.98), rgba(7, 7, 7, 0.98));
      box-shadow: var(--shadow);
    }

    object,
    embed {
      display: block;
      width: 100%;
      height: 100%;
      background: white;
    }

    .empty-state {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      padding: 32px;
      text-align: center;
      color: var(--muted);
      line-height: 1.8;
    }

    .empty-state a {
      color: white;
      font-weight: 800;
    }

    @media (max-width: 820px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .actions {
        justify-content: flex-start;
      }

      .viewer {
        height: calc(100vh - 210px);
        min-height: 420px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="title-wrap">
        <span class="eyebrow">Document viewer</span>
        <h1 id="docTitle">Portfolio Document</h1>
        <p>
          Open resumes, certificates, and academic records in the same cinematic
          portfolio theme.
        </p>
      </div>

      <div class="actions">
        <a class="btn btn-secondary" href="./">Back to Portfolio</a>
        <a class="btn btn-primary" id="downloadLink" href="#" download>Download PDF</a>
      </div>
    </header>

    <div class="viewer">
      <object id="pdfObj" data="" type="application/pdf">
        <embed id="pdfEmbed" src="" type="application/pdf" />
        <div class="empty-state">
          <p>
            Your browser does not support embedded PDFs.
            <a id="fallbackLink" href="#">Download the file here</a>.
          </p>
        </div>
      </object>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get("file");
    const title = params.get("title") || "Portfolio Document";
    const safeFile =
      file && file.startsWith("pdf/") && file.toLowerCase().endsWith(".pdf") ? file : "";

    const titleNode = document.getElementById("docTitle");
    const pdfObject = document.getElementById("pdfObj");
    const pdfEmbed = document.getElementById("pdfEmbed");
    const downloadLink = document.getElementById("downloadLink");
    const fallbackLink = document.getElementById("fallbackLink");
    const viewer = document.querySelector(".viewer");

    titleNode.textContent = title;
    document.title = title + " | Deepak Kumar Singh";

    if (safeFile) {
      pdfObject.data = safeFile;
      pdfEmbed.src = safeFile;
      downloadLink.href = safeFile;
      fallbackLink.href = safeFile;
    } else {
      viewer.innerHTML =
        '<div class="empty-state"><p>No document was selected. Return to the portfolio and choose a resume or certificate from there.</p></div>';
      downloadLink.setAttribute("aria-disabled", "true");
      downloadLink.style.pointerEvents = "none";
      downloadLink.style.opacity = "0.5";
    }
  </script>
</body>
</html>
